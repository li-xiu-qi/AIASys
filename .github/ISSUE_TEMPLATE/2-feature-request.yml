name: Feature Request
description: Suggest a new feature or enhancement
labels:
  - enhancement
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Please describe the use case for this feature.
