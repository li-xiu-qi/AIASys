name: PR Merge Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pull_number:
        description: 'Pull request number'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

jobs:
  merge-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check mergeable state
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.eventName === 'workflow_dispatch'
              ? context.payload.inputs.pull_number
              : context.issue.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const mergeableState = pr.data.mergeable_state;
            const isMergeable = pr.data.mergeable;

            let body = '';

            if (mergeableState === 'dirty') {
              body = `## ⚠️ 合并冲突检测

该 PR 当前存在合并冲突（\`mergeable_state: dirty\`），无法直接合并。

### 建议修复步骤

1. 在本地同步上游最新基础分支并解决冲突：
\`\`\`bash
git remote add upstream https://github.com/AIAsys/AIASys.git
git fetch upstream
git rebase upstream/${{ github.base_ref }}
# 解决冲突后
git push --force-with-lease
\`\`\`

2. 或者，如果使用的是 GitHub 网页端，可以尝试点击 **Update branch** 按钮（仅适用于部分场景，且可能无法解决所有冲突）。

3. 解决冲突后，请确保重新推送，CI 会自动重新检测。

> 如果 rebase 遇到困难，可以联系维护者协助处理。`;
            } else if (mergeableState === 'blocked') {
              body = `## ⚠️ 合并被阻止

该 PR 当前被阻止合并（\`mergeable_state: blocked\`），可能原因：
- 分支保护规则要求至少一个 review
- CI 检查未通过
- 其他合并限制条件

请检查上述条件后重试。`;
            } else if (mergeableState === 'unknown') {
              // GitHub is still calculating mergeable state, skip comment
              return;
            }

            if (!body) {
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('## 合并冲突检测'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
