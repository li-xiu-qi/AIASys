[[files]]
relative_path = "README.md"
content = "# 电商用户行为数据分析\n\n## 数据集说明\n\n- **来源**：某电商平台 2024 年 6 月用户行为日志（模拟数据）\n- **样本量**：约 50,000 条记录\n- **字段说明**：\n  - `user_id`：用户唯一标识\n  - `event_type`：行为类型（view / cart / purchase）\n  - `product_id`：商品标识\n  - `category`：商品类目\n  - `price`：商品价格（元）\n  - `timestamp`：行为发生时间\n\n## 分析目标\n\n1. 用户行为漏斗分析：从浏览到加购到购买的转化率\n2. 热销类目识别：哪些类目的浏览量和转化率最高\n3. 用户价值分层：基于购买频次和金额划分用户群体\n4. 时段分析：一天中哪些时段用户最活跃\n\n## 数据清洗记录\n\n- 去除 `price` 为负值或缺失的记录\n- 将 `timestamp` 转换为 datetime 类型\n- 对 `event_type` 做标准化（统一为小写）\n\n## 探索性分析发现\n\n- 浏览→加购转化率约 12%，加购→购买转化率约 35%\n- 电子产品和服装类目流量最大，但美妆类目的购买转化率最高\n- 晚间 20:00-22:00 是用户活跃高峰\n- 存在约 15% 的用户只看不买（零购买记录）\n\n## 结论与建议\n\n- 优化加购流程：当前 88% 的浏览用户没有加购，可能存在商品信息展示不足的问题\n- 针对美妆类目加大投放：虽然流量不如电子产品和服装，但转化效率更高\n- 晚间时段推送促销信息：用户活跃高峰与促销结合可提升转化\n\n---\n\n*以上内容为示例，请替换为你自己的数据集和分析结论。*\n"

