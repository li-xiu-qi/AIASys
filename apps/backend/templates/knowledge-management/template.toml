relative_path = "docs/knowledge-base-guide.md"
content = "# AIASys 知识库使用指南\n\n知识库是 AIASys 的向量文档检索系统，支持语义检索、全文检索和混合检索。\n\n## 创建知识库\n\n使用 Agent 工具 `CreateKnowledgeBase` 或前端知识库面板创建。\n\n创建时需指定：\n- `name`：知识库名称\n- `kind`：document（文档型）| structured（结构化）| web（网页型）| code（代码型）\n- `embedding_model`：嵌入模型名称（默认使用系统配置的文本模型）\n- `chunk_size` / `chunk_overlap`：分块大小和重叠量\n\n## 上传文档\n\n使用 `UploadDocumentsToKnowledgeBase` 或 `UploadDocumentsToKnowledgeBaseBatch` 上传。\n\n支持的格式：PDF、TXT、Markdown、DOCX、HTML 等。\n\n## 检索模式\n\n| 模式 | 适用场景 | 说明 |\n|------|----------|------|\n| vector | 概念探索、语义相似查询 | 基于向量相似度，召回语义相近但关键词不同的内容 |\n| fulltext | 精确关键词查找 | 基于 BM25 或 jieba 分词，适合专有名词、代码片段 |\n| hybrid | 综合查询（推荐） | 结合语义和关键词，兼顾召回率和精确度 |\n\n## 查询参数\n\n- `query`：查询文本\n- `mode`：检索模式（vector/fulltext/hybrid）\n- `top_k`：返回结果数量\n- `filters`：按文档名、标签等过滤\n\n## 维护操作\n\n- `ListKnowledgeBaseDocuments`：列出库中文档\n- `DeleteDocumentsFromKnowledgeBase`：删除指定文档\n- `DeleteKnowledgeBase`：删除整个知识库\n\n## 当前工作区知识库配置\n\n（Agent 在创建知识库后填写）\n\n- 知识库名称：\n- 知识库 ID：\n- 检索模式：\n- 文档数量：\n"

