relative_path = "docs/graph-guide.md"
content = "# AIASys 知识图谱使用指南\n\n知识图谱通过 LLM 自动从文本中抽取实体和关系，构建可交互的关系网络。\n\n## 创建图谱\n\n使用 `CreateKnowledgeGraph` 创建新图谱。\n\n## 添加文档并构图\n\n使用 `UploadDocumentsToGraph` 上传资料。系统会自动：\n1. 抽取实体（人物、组织、概念、事件等）\n2. 抽取关系（属于、创造、影响、位于等）\n3. 实体消歧（合并同名实体）\n4. 更新图谱存储\n\n## 查询方式\n\n### 实体搜索\n`SearchKnowledgeGraphEntities` — 按名称或描述搜索实体。\n\n### 实体详情\n`GetKnowledgeGraphEntityDetail` — 获取实体的完整属性、关系和来源文档。\n\n### 关系查询\n`QueryEntityRelations` — 查询两个实体之间的关系路径。\n\n### 社区发现\n`GetCommunityReport` — 生成社区报告，发现知识聚类和主题分布。\n\n## 手工维护\n\n- `CreateGraphEntity` / `UpdateGraphEntity` / `DeleteGraphEntity`：手工增删改实体\n- `CreateGraphRelation`：手工创建关系\n\n## 可视化\n\n在前端 Knowledge > Graph 页面中可查看：\n- 力导向图布局\n- 社区着色\n- 实体详情面板\n- 关系过滤\n\n## 当前工作区图谱配置\n\n（Agent 在创建图谱后填写）\n\n- 图谱名称：\n- 图谱 ID：\n- 实体数量：\n- 关系数量：\n- 社区数量：\n"
