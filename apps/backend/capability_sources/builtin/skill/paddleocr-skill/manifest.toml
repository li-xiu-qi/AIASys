description = """基于 PaddleOCR Layout Parsing API 将 PDF/图片转换为 Markdown，保留文档版式、表格和图片。
当用户需要把扫描版 PDF、图片格式的文档或包含复杂版式的 PDF 转为可编辑文本时使用。
Agent 会主动检查工作区是否已配置 PADDLEOCR token，缺失时询问用户提供；若用户不提供，回退到 pymupdf4llm。"""
